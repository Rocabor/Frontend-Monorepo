name: 'Changed Apps'
description: 'Detect which apps have changed in the repository'
inputs:
  apps-dir:
    description: 'Directory containing the apps'
    required: true
    default: 'apps'
outputs:
  apps:
    description: 'Comma-separated list of changed apps'
    value: ${{ steps.changed.outputs.apps }}
runs:
  using: composite
  steps:
    - name: Detect changed apps
      id: changed
      shell: bash
      run: |
        APPS_DIR="${{ inputs.apps-dir }}"
        
        if [ -d "$APPS_DIR" ]; then
          ALL_APPS=$(find "$APPS_DIR" -mindepth 1 -maxdepth 1 -type d | sort)
        else
          echo "apps=" >> $GITHUB_OUTPUT
          exit 0
        fi
        
        PREV_COMMIT="${{ github.event.before }}"
        if [ -z "$PREV_COMMIT" ] || [ "$PREV_COMMIT" == "0000000000000000000000000000000000000000" ]; then
          PREV_COMMIT="HEAD~1"
        fi
        
        CHANGED_APPS=""
        for app in $ALL_APPS; do
          if git diff --name-only "$PREV_COMMIT" HEAD -- "$app" 2>/dev/null | grep -q .; then
            APP_NAME=$(basename "$app")
            if [ -z "$CHANGED_APPS" ]; then
              CHANGED_APPS="$APP_NAME"
            else
              CHANGED_APPS="$CHANGED_APPS,$APP_NAME"
            fi
          fi
        done
        
        echo "apps=$CHANGED_APPS" >> $GITHUB_OUTPUT