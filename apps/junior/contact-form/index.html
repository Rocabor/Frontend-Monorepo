<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png" />

    <link rel="stylesheet" href="src/style.css" />
    <script type="module" src="src/main.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Karla:wght400;700&display=swap" rel="stylesheet" />

    <title>Frontend Mentor | Contact form</title>
  </head>
  <body>
    <!--* Toast -->
    <div class="bg-grey-900 flex flex-col gap-2 rounded-lg p-6 absolute top-6 max-w-81.75 md:max-w-112.5 place-self-center text-white text-[18px]" role="alert" aria-live="assertive">
      <p class="flex gap-2">
        <img src="assets/images/icon-success-check.svg" alt="" />
        <strong>Message Sent!</strong>
      </p>
      <p class="label-text text-green-200">Thanks for completing the form. We'll be in touch soon!</p>
    </div>

    <!--* Form Content -->
    <main class="p-300 md:p-500 xl:max-w-184 md:max-w-172.5 mx-auto w-full rounded-2xl bg-white">
      <!--* Title -->
      <header class="mb-400">
        <h1 class="preset-1">Contact Us</h1>
      </header>

      <!--* Fields -->
      <form action="#" method="POST" class="space-y-300">
        <div class="gap-200 grid grid-cols-1 md:grid-cols-2">
          <div class="flex flex-col">
            <label for="first-name" class="label-text mb-2">
              First Name
              <span class="required-dot" aria-hidden="true">*</span>
            </label>
            <input type="text" id="first-name" name="first-name" required aria-required="true" aria-describedby="first-name-error" class="form-control" />
            <span id="first-name-error" class="text-red-errors mt-2 text-sm" role="alert" hidden>This field is required</span>
          </div>

          <div class="flex flex-col">
            <label for="last-name" class="label-text mb-2">
              Last Name
              <span class="required-dot" aria-hidden="true">*</span>
            </label>
            <input type="text" id="last-name" name="last-name" required aria-required="true" aria-describedby="last-name-error" class="form-control" />
            <span id="last-name-error" class="text-red-errors mt-2 text-sm" role="alert" hidden>This field is required</span>
          </div>
        </div>

        <div class="flex flex-col">
          <label for="email" class="label-text mb-2">
            Email Address
            <span class="required-dot" aria-hidden="true">*</span>
          </label>
          <input type="email" id="email" name="email" required aria-required="true" aria-describedby="email-address-error" class="form-control" />
          <span id="email-address-error" class="text-red-errors mt-2 text-sm" role="alert" hidden>Please enter a valid email address</span>
        </div>

        <!--* Contact Method -->
        <fieldset class="space-y-200">
          <!-- Title Block -->
          <legend class="label-text mb-4">
            Query Type
            <span class="required-dot" aria-hidden="true">*</span>
          </legend>

          <!-- Radio Selection -->
          <div class="gap-200 grid grid-cols-1 md:grid-cols-2">
            <label for="general-enquiry" class="query-option">
              <input id="general-enquiry" type="radio" name="query-type" value="general" required aria-required="true" aria-describedby="radio-select" class="radio-custom" />
              <span class="label-text text-[18px]">General Enquiry</span>
            </label>

            <label for="support-request" class="query-option">
              <input id="support-request" type="radio" name="query-type" value="support" required aria-required="true" aria-describedby="radio-select" class="radio-custom" />
              <span class="label-text text-[18px]">Support Request</span>
            </label>
          </div>
          <span id="radio-select" class="text-red-errors mt-2 text-sm" role="alert" hidden>Please select a query type</span>
        </fieldset>

        <!--* Message -->
        <div class="h-68 md:h-41 xl:h-34.25 mb-10 flex flex-col">
          <label for="message" class="label-text mb-2">
            Message
            <span class="required-dot" aria-hidden="true">*</span>
          </label>

          <textarea id="message" name="message" required aria-required="true" aria-describedby="textarea-empty-error" class="form-control h-full resize-none"></textarea>
          <span id="textarea-empty-error" class="text-red-errors mt-2 text-sm" role="alert" hidden>This field is required</span>
        </div>

        <!--* Checkbox -->
        <div class="gap-200 mb-2 flex items-start">
          <input type="checkbox" id="consent" name="consent" required aria-required="true" aria-describedby="textarea-empty" class="h-6 w-6 cursor-pointer self-center accent-green-600" />
          <label for="consent" class="label-text mb-0 cursor-pointer">
            I consent to being contacted by the team
            <span class="required-dot" aria-hidden="true">*</span>
          </label>
        </div>
        <span id="textarea-empty" class="text-red-errors text-sm" role="alert" hidden>To submit this form, please consent to being contacted</span>

        <!--* Button Submit-->
        <button type="submit" class="btn-submit">Submit</button>
      </form>
    </main>

    
  </body>
</html>
