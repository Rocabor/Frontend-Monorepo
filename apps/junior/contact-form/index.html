<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png" />

    <link rel="stylesheet" href="src/style.css" />
    <script type="module" src="src/main.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Karla:wght400;700&display=swap" rel="stylesheet" />

    <title>Frontend Mentor | Contact form</title>
  </head>
  <body>

    <!--* Form Content -->
    <main class="p-300 md:p-500 w-full max-w-184 rounded-2xl bg-white">

      <!--* Title -->
      <header class="mb-400">
        <h1 class="preset-1">Contact Us</h1>
      </header>

      <!--* Fields -->
      <form action="#" method="POST" class="space-y-300">
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-200">

        <div class="flex flex-col">
          <label for="first-name" class="label-text">
            First Name <span class="required-dot" aria-hidden="true">*</span>
          </label>
          <input type="text" id="first-name" name="first-name" required class="form-control">
        </div>

        <div class="flex flex-col">

          <label for="last-name" class="label-text">
            Last Name <span class="required-dot" aria-hidden="true">*</span>
          </label>
          <input type="text" id="last-name" name="last-name" required class="form-control">
        </div>
      </div>

      <div class="flex flex-col">

        <label for="email" class="label-text">
          Email Address <span class="required-dot" aria-hidden="true">*</span>
        </label>
        <input type="email" id="email" name="email" required class="form-control">
      </div>

      <!--* Contact Method -->
      <fieldset class="space-y-200">

        <!-- Title Block -->
        <legend class="label-text">
          Query Type <span class="required-dot" aria-hidden="true">*</span>
        </legend>

        <!-- Radio Selection -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-200">

          <label class="query-option">
            <input type="radio" name="query-type" value="general" required class=" w-6 h-6">
            <span class="label-text text-[18px]">General Enquiry</span>
          </label>

          <label class="query-option">
            <input type="radio" name="query-type" value="support" required class=" w-6 h-6">
            <span class="label-text text-[18px]">Support Request</span>
          </label>
        </div>
      </fieldset>

      <!--* Message -->
      <div class="flex flex-col">

        <label for="message" class="label-text">
          Message <span class="required-dot" aria-hidden="true">*</span>
        </label>

        <textarea id="message" name="message" rows="5" required class="form-control resize-none"></textarea>
      </div>

      <!--* Checkbox -->
      <div class="flex items-start gap-200 pt-100">
        <input 
          type="checkbox" id="consent" name="consent" required 
          class="accent-brand-green-600 w-4 h-4 mt-1 cursor-pointer"
        >
        <label for="consent" class="text-sm text-brand-grey-900 cursor-pointer">
          I consent to being contacted by the team <span class="required-dot" aria-hidden="true">*</span>
        </label>
      </div>

      <!--* Button Submit-->
      <button type="submit" class="btn-submit">
        Submit
      </button>

    </form>

    </main>
  </body>
</html>
