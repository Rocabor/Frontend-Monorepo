<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Interactive rating component</title>
</head>
<body class="min-h-screen bg-grey-950 flex items-center justify-center p-4 font-overpass">
  <div class="card bg-grey-900 rounded-2xl p-6 max-w-[400px] w-full">
    
    <!-- Rating state start -->
    <div class="rating-form">
      <div class="w-10 h-10 bg-grey-900 rounded-full flex items-center justify-center mb-6">
        <img src="./images/icon-star.svg" alt="Star" class="w-4 h-4">
      </div>
      
      <h1 class="text-white text-2xl font-bold mb-2">How did we do?</h1>
      
      <p class="text-grey-500 text-[15px] mb-6">
        Please let us know how we did with your support request. All feedback is appreciated 
        to help us improve our offering!
      </p>
      
      <div class="flex justify-between mb-6">
        <button class="rating-option w-10 h-10 rounded-full bg-grey-900 text-grey-500 font-bold hover:bg-grey-500 hover:text-white transition-colors" data-value="1">1</button>
        <button class="rating-option w-10 h-10 rounded-full bg-grey-900 text-grey-500 font-bold hover:bg-grey-500 hover:text-white transition-colors" data-value="2">2</button>
        <button class="rating-option w-10 h-10 rounded-full bg-grey-900 text-grey-500 font-bold hover:bg-grey-500 hover:text-white transition-colors" data-value="3">3</button>
        <button class="rating-option w-10 h-10 rounded-full bg-grey-900 text-grey-500 font-bold hover:bg-grey-500 hover:text-white transition-colors" data-value="4">4</button>
        <button class="rating-option w-10 h-10 rounded-full bg-grey-900 text-grey-500 font-bold hover:bg-grey-500 hover:text-white transition-colors" data-value="5">5</button>
      </div>
      
      <button class="submit-btn w-full bg-orange-500 text-white rounded-full py-3 uppercase tracking-widest font-bold hover:bg-white hover:text-orange-500 transition-colors">
        Submit
      </button>
    </div>
    <!-- Rating state end -->

    <!-- Thank you state start -->
    <div class="thank-you-state hidden text-center">
      <img src="./images/illustration-thank-you.svg" alt="Thank you" class="mx-auto mb-6 w-24">
      
      <p class="text-orange-500 bg-grey-900 rounded-full py-1 px-4 inline-block mb-6 text-[15px]">
        You selected <span class="selected-rating">0</span> out of 5
      </p>
      
      <h2 class="text-white text-2xl font-bold mb-2">Thank you!</h2>
      
      <p class="text-grey-500 text-[15px]">
        We appreciate you taking the time to give a rating. If you ever need more support, 
        don't hesitate to get in touch!
      </p>
    </div>
    <!-- Thank you state end -->

  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
