<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Chivo:wght@300;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="src/style.css" />
    <script type="module" src="src/main.js"></script>

    <title>Frontend Mentor | Pod request access landing page</title>
  </head>
  <body>
    <header class="">
      <img src="assets/desktop/logo.svg" alt="pod" />
    </header>

    <main class="">
      <!-- text -->
      <div class="text">
        <h1 class="preset-1">
          <span class="text-green">Publish your podcasts</span>
          everywhere.
        </h1>
        <p class="preset-2">Upload your audio to Pod with a single click. We’ll then distribute your podcast to Spotify, Apple Podcasts, Google Podcasts, Pocket Casts and more!</p>
      </div>

      <!-- logos -->
      <div class="logos">
        <img src="assets/desktop/spotify.svg" alt="" class="h-[17px] w-[56px]" />
        <img src="assets/desktop/apple-podcast.svg" alt="" class="h-[17px] w-[45px]" />
        <img src="assets/desktop/google-podcasts.svg" alt="" class="h-[11px] w-[73px]" />
        <img src="assets/desktop/pocket-casts.svg" alt="" class="h-[15px] w-[76px]" />
      </div>

      <!-- form-mobile -->
      <form class="form">
        <label for="email" class="sr-only">Email address</label>
        <input id="email" type="email" placeholder="Email address" name="email" aria-invalid="false" class="bg-blue900 cursor-text" />
        <button type="submit" class="bg-green preset-3 active:scale-95 cursor-pointer">Request access</button>
      </form>
    </main>
  </body>
</html>
