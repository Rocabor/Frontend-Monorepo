<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png" />

    <title>Frontend Mentor | Results summary component</title>

    <link href="./src/style.css" rel="stylesheet" />
    <script type="module" src="src/script.js"></script>
  </head>
  <body class="flex flex-col items-center gap-2 md:justify-center">
    
    <!-- ============================================= -->
    <!--  SECCIÓN: CONTENIDO PRINCIPAL -->
    <!-- ============================================= -->
    <main class="w-full flex items-center justify-center" role="main">
      <section class="flex flex-col w-full gap-6 bg-white shadow-shadow md:flex-row md:w-[686px] md:items-center md:rounded-4xl md:gap-0 xl:w-[738px]">
        
        <!-- ============================================= -->
        <!--  COMPONENTE: PUNTAJE GENERAL (RESULTADO) -->
        <!-- ============================================= -->
        <article class="flex justify-center items-center w-full h-[356px] bg-gradient-2 rounded-b-[32px] md:w-[338px] md:h-[512px] md:rounded-t-[32px] " aria-labelledby="result-title">

          <div class="flex flex-col items-center gap-6 text-center w-[260px] h-[292px] md:w-[200px] md:h-[422px] xl:w-[260px]">
            <h1 id="result-title" class="text-preset-5-bold text-navy-200 md:text-preset-4">Your Result</h1>
            <div>
              <div class="flex items-center justify-center size-[140px] rounded-full bg-gradient-1 md:size-[200px]" role="status" aria-live="polite" aria-label="Score: 76 out of 100">
                <p class="text-preset-2 md:text-preset-1">
                  <span aria-hidden="true">76</span>
                  <span class="sr-only">76</span>
                  <span class="text-preset-6-bold text-navy-200 opacity-50 block md:text-preset-5-bold" aria-hidden="true">of 100</span>
                </p>
              </div>
            </div>
            <div class="flex flex-col gap-2 md:gap-4">
              <h2 class="text-preset-4 md:text-preset-3">Great</h2>
              <p class="text-preset-6-bold text-navy-200 md:text-preset-5-medium">You scored higher than 65% of the people who have taken these tests.</p>
            </div>
          </div>
        </article>

        <!-- ============================================= -->
        <!--  COMPONENTE: DESGLOSE DE CATEGORÍAS (RESUMEN) -->
        <!-- ============================================= -->
        <section class="flex flex-col gap-6 w-[315px] h-[399px] mx-auto md:gap-8 md:w-[269px] md:h-[423px] xl:w-[288px]" aria-labelledby="summary-title">
          <h2 id="summary-title" class="text-preset-5-bold text-navy-950 md:text-preset-4">Summary</h2>

          <div class="flex flex-col gap-4 h-[272px]" role="list">
            <!-- CATEGORÍA: REACTION -->
            <div class="flex items-center justify-center h-[56px] rounded-xl bg-red-50" role="listitem">
              <div class="flex justify-between text-red-400 w-[283px] h-[21px] md:w-[235px] h-[23px]">
                <div class="flex gap-4 text-preset-6- md:text-preset-5-medium">
                  <img src="assets/images/icon-reaction.svg" alt="Lightning bolt icon representing Reaction score" aria-hidden="true" />
                  <span>Reaction</span>
                </div>
                <div class="text-preset-6-bold text-navy-950 md:text-preset-5-bold">
                  <span aria-label="Reaction score: 80 out of 100">80</span>
                  <span class="opacity-50" aria-hidden="true">/ 100</span>
                </div>
              </div>
            </div>

            <!-- CATEGORÍA: MEMORY -->
            <div class="flex items-center justify-center h-[56px] rounded-xl bg-yellow-50" role="listitem">
              <div class="flex justify-between text-yellow-400 w-[283px] h-[21px] md:w-[235px] h-[23px]">
                <div class="flex gap-4 text-preset-6-medium md:text-preset-5-medium">
                  <img src="assets/images/icon-memory.svg" alt="Brain icon representing Memory score" aria-hidden="true" />
                  <span>Memory</span>
                </div>
                <div class="text-preset-6-bold text-navy-950 md:text-preset-5-bold">
                  <span aria-label="Memory score: 92 out of 100">92</span>
                  <span class="opacity-50" aria-hidden="true">/ 100</span>
                </div>
              </div>
            </div>

            <!-- CATEGORÍA: VERBAL -->
            <div class="flex items-center justify-center h-[56px] rounded-xl bg-green-50" role="listitem">
              <div class="flex justify-between text-green-500 w-[283px] h-[21px] md:w-[235px] h-[23px]">
                <div class="flex gap-4 text-preset-6-medium md:text-preset-5-medium">
                  <img src="assets/images/icon-verbal.svg" alt="Chat bubble icon representing Verbal score" aria-hidden="true" />
                  <span>Verbal</span>
                </div>
                <div class="text-preset-6-bold text-navy-950 md:text-preset-5-bold">
                  <span aria-label="Verbal score: 61 out of 100">61</span>
                  <span class="opacity-50" aria-hidden="true">/ 100</span>
                </div>
              </div>
            </div>

            <!-- CATEGORÍA: VISUAL -->
            <div class="flex items-center justify-center h-[56px] rounded-xl bg-blue-50" role="listitem">
              <div class="flex justify-between text-blue-800 w-[283px] h-[21px] md:w-[235px] h-[23px]">
                <div class="flex gap-4 text-preset-6-medium md:text-preset-5-medium">
                  <img src="assets/images/icon-visual.svg" alt="Eye icon representing Visual score" aria-hidden="true" />
                  <span>Visual</span>
                </div>
                <div class="text-preset-6-bold text-navy-950 md:text-preset-5-bold">
                  <span aria-label="Visual score: 73 out of 100">73</span>
                  <span class="opacity-50" aria-hidden="true">/ 100</span>
                </div>
              </div>
            </div>
          </div>

          <button class="h-[56px] rounded-[128px] bg-navy-950 active:bg-gradient-2 border-none text-preset-5-bold" aria-label="Continue to see detailed results">Continue</button>
        </section>
      </section>
    </main>

    <!-- ============================================= -->
    <!--  SECCIÓN: PIE DE PÁGINA (FOOTER) -->
    <!-- ============================================= -->
    <footer id="typing-footer">
      <div class="footer-container">
        <nav class="text-black text-preset-6-medium" aria-label="Attribution links">
          <ul class="attribution-list text-center">
            <li>Challenge by <a href="https://www.frontendmentor.io/challenges/results-summary-component-CE_K6s0maV" target="_blank" rel="noopener noreferrer" class="text-green-500 font-bold ">Frontend Mentor</a></li>
            <li>
              Coded by <a href="https://www.frontendmentor.io/profile/Rocabor" target="_blank" rel="noopener noreferrer" class="text-blue-800 font-bold ">© <span class="year">2026 </span>Roberto Borges</a>
            </li>
          </ul>
        </nav>
      </div>
    </footer>
  </body>
</html>
