<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png" />

    <title>Frontend Mentor | Huddle landing page with single introductory section</title>

    <link rel="stylesheet" href="src/style.css" />
    <script type="module" src="src/main.js"></script>

   
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />  
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap" rel="stylesheet">


  </head>
  <body class="flex flex-col items-center relative min-h-dvh bg-purple-700 bg-[url('/images/bg-mobile.svg')] bg-no-repeat pt-10">


     
    <div class="flex flex-col gap-16 w-[304px] ">

      <img class="w-[120px] h-[19px]" src="images/logo.svg" alt="">

      <div class="flex flex-col gap-14 ">

        <img class="h-[215px]" src="images/illustration-mockups.svg" alt="">

        <div class=" flex flex-col items-center gap-8 h-[276px]">

          <div class="flex flex-col h-[204px] gap-6">

            <h1 class="text-preset-2 text-white text-center">Build The Community Your Fans Will Love</h1>

            <p class="text-preset-5 text-white text-center">Huddle re-imagines the way we build communities. You have a voice, but so does your audience. Create connections with your users as you engage in genuine discussion. </p>
          </div>

          <button type="button" class="text-preset-6 text-purple-700 bg-white w-[200px] h-10 rounded-[20px]">Register</button>
        </div>
      </div>
    </div>

    <!-- Cálculo medida relativa: (131 / 375) * 100 = 34.93% //  (732 / 800) * 100 = 91.5% -->
    <div class=" absolute flex gap-4 left-[34.93%] top-[91.5%]">

      <div class="border-white border w-[27.14px] h-7 rounded-full flex justify-center items-center">
        <span class="icon-[eva--facebook-fill] size-4.5 text-white" ></span>
      </div>
      <div class="border-white border w-[27.14px] h-7 rounded-full flex justify-center items-center">
        <span class="icon-[ri--twitter-fill] size-3.5 text-white"></span>
      </div>
      <div class="border-white border w-[27.14px] h-7 rounded-full flex justify-center items-center">
        <span class="icon-[akar-icons--instagram-fill] size-3.5 text-white" ></span> 
      </div>


    </div>



  </body>
</html>
